# Utilisé pour le développement local — monte le code source
# Usage: docker-compose -f docker-compose.dev.yml up
name: dblumi-dev

services:
  app:
    build:
      context: .
      target: api-builder
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./data:/data
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/data/dblumi.db
      - DBLUMI_ENCRYPTION_KEY=${DBLUMI_ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=http://localhost:3000
      # ── OAuth providers (optionnel) ──
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # ── AI Copilot (un seul provider à la fois) ──
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      # ── Keycloak SSO ──
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      # ── SMTP (password reset) ──
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    command: node --watch src/api/dist/index.js
